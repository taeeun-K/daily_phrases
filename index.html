    //오늘날짜 지정

    //랜덤 숫자 뽑기(멘트 index 기준)
    function getRandomIdx(max){
      return Math.floor(Math.random() * max);
    };

    //오늘의 멘트 설정함수
    //forceNew: 강제 새로고침 여부
    function setTodayPhrase(forceNew = false){
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));

      let index;

      if(!forceNew && saved && saved.date === today){
        //저장된 데이터가 있고, 날짜가 오늘과 같다면 저장된 멘트 사용
        index = saved.index;
      } else {
        //새로운 멘트 뽑기
        index = getRandomIdx(phrases.daily.length);
        //로컬스토리지에 저장
        localStorage.setItem(STORAGE_KEY, JSON.stringify({date: today, index}));
      }

      //멘트 화면에 표시
      document.getElementById('quote').textContent = phrases.daily[index];
    };

    //페이지 열릴 때 실행하기
